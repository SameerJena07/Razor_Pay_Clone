<!DOCTYPE html>
<html lang="en">
<head>

    <!--Navbar-->
    <nav class="bg-deepBlue">

            <a href="/" class="cursor-pointer py-7 pr-7">

            <ul class="flex space-x-6">

                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">

                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Corporate Card</a>
                </li>
                
                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Payroll</a>
                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Resources</a>
                    <div class="absolute bottom-0 w-full h-1 bg-lightBlue hidden group-hover:block transition-all duration-200"></div>
                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Support</a>
                    <div class="absolute bottom-0 w-full h-1 bg-lightBlue hidden group-hover:block transition-all duration-200"></div>
                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Pricing</a>
                    <div class="absolute bottom-0 w-full h-1 bg-lightBlue hidden group-hover:block transition-all duration-200"></div>
                </li>
            </ul>

            <div class="flex space-x-6">
                <img src="./images/india-flag.png" alt="flag" width="40px" height="20px"/>

                <button class="px-5 py-1 font-mullish text-white border-lightBlue border rounded-sm text-sm font-bold">Log In</button>
                <button class="px-4 py-1 font-mullish bg-white text-lightBlue border rounded-sm text-sm transition-all duration-200 hover:text-lightBlue500">Sign Up</button>
            </div>

        </div>
    </nav>

    <!--Hero-Section-->
    <section
    class="relative bg-deepBlue">
        
    <div class="w-10/12  max-w-[1080px] flex flex-row justify-between items-center mx-auto">
        <!--left part-->
        <div class="space-y-8">
            <h1 class="font-mullish font-bold text-[40px] leading-[1.2] text-white">Power your finance, grow your business</h1>
            <div class="w-6 h-1 bg-greenLight"></div>
            <p class="font-mullish text-[14px] leading-7 text-white opacity-70">Accept payment from customer. Automate payouts to vendor & employees. Never run out of working capital.</p>
            <button class="bg-lightBlue text-white rounded-md font-mullish font-bold hover:bg-lightBlue500 transition-all duration 200 py-[14px] px-[14px] max-w-fit">Sign Up Now</button>
        </div>
        <!--right part-->
        <img src="./images/hero-section.png" alt="hero-section-img" class="w-full max-w-[680px]">
    </div>

    <!--shape part-->
    <div class="w-[102%] absolute left-0 right-0">
        <img src="https://vanoop218184.github.io/RazorPay_clone/images/hero-shape.svg" alt="hero-shape" class=" w-full object-fill">

                        <a href=""></a>

                <img src="" alt="">
